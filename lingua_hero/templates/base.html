<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="lINS_txHc6tO1KCuGMPasGnK2pO2FuByJ31o7n42TRY" />
  <meta name="description" content="LinguaHero — free language learning app built by an 11-year-old developer. Study English and German with interactive levels, games and flashcards.">
  <meta name="keywords" content="language learning, English irregular verbs, German articles, learn German, learn English, free language app">
  <meta property="og:title" content="LinguaHero — Learn Languages the Fun Way">
  <meta property="og:description" content="Free language learning app with English and German. Built by an 11-year-old developer.">
  <meta property="og:url" content="https://lingua-hero.com">
  <meta property="og:type" content="website">
  <title>{% block title %}LinguaHero{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
  <a href="{{ url_for('home') }}" class="nav-logo">⚡ LinguaHero</a>
  <div class="nav-center">
    {% if language is defined and language %}
      <a href="{{ url_for('language_home', language=language) }}" class="nav-link">{{ lang.flag }} {{ lang.name }}</a>
    {% endif %}
    <a href="{{ url_for('home') }}" class="nav-link">Home</a>
    <a href="{{ url_for('about') }}" class="nav-link">About</a>
  </div>
  <div class="nav-visitors">
    👥 {{ visitors | default(0) }} visitors
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<script data-goatcounter="https://lingua-hero.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
